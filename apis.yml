name: Clockwise
description: >-
  Clockwise was an AI-powered calendar optimization platform that helped
  individuals, teams, and organizations protect focus time, reduce meeting
  overload, and coordinate scheduling intelligently. The platform provided
  REST APIs for managing focus time blocks, meeting preferences, smart
  scheduling links, and team calendar coordination. Clockwise was acquired
  by Salesforce and shut down on March 27, 2026.
