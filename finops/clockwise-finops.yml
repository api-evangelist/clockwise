name: Clockwise FinOps
description: >-
  FinOps Framework 1.0 FOCUS-aligned cost and usage data for the Clockwise
  AI calendar optimization platform. Covers cost allocation, usage metering,
  and optimization guidance for API and SaaS consumption. Clockwise was
  acquired by Salesforce and shut down on March 27, 2026.
specificationVersion: "1.0"
provider: Clockwise
providerURL: https://www.getclockwise.com
status: discontinued
discontinuedDate: "2026-03-27"
acquiredBy: Salesforce
costs:
  - name: Per-Seat SaaS Subscription
    description: >-
      Primary cost driver for Clockwise was per-seat monthly or annual
      subscription fees. Costs scaled linearly with the number of users
      on the plan.
    costModel: per-seat
    currency: USD
    billingPeriods:
      - monthly
      - annual
    tiers:
      - plan: Free
        unitPrice: 0.00
        unit: user/month
      - plan: Teams (Annual)
        unitPrice: 6.75
        unit: user/month
      - plan: Teams (Monthly)
        unitPrice: 7.75
        unit: user/month
      - plan: Business (Annual)
        unitPrice: 11.50
        unit: user/month
      - plan: Enterprise
        unitPrice: 0.00
        unit: user/month
        note: Custom pricing negotiated with sales
    savingsOpportunity:
      - description: >-
          Annual billing for Teams plan saves approximately 13% versus
          monthly billing ($6.75 vs $7.75/user/month).
        savingsPercent: 13
      - description: >-
          Volume discounts available for Enterprise plans with large user
          counts. Negotiate directly with Clockwise sales for favorable
          per-seat pricing at scale.
  - name: API Integration Costs
    description: >-
      API access was bundled into paid plans. Teams plan included limited
      API access. Business and Enterprise plans offered full API access
      without additional per-call charges (within rate limits).
    costModel: included
    includedIn:
      - Business
      - Enterprise
    overage:
      description: >-
        Custom API usage beyond standard rate limits required Enterprise
        plan and negotiated terms. No published per-call overage pricing.
optimization:
  - name: Right-Size Plan Selection
    description: >-
      Evaluate actual feature utilization before committing to higher-tier
      plans. Focus Time and scheduling link features drive most Teams
      plan value; analytics and admin controls justify Business tier.
    impact: medium
    effort: low
  - name: Annual Billing Commitment
    description: >-
      Commit to annual billing for Teams plan to save approximately 13%
      versus month-to-month pricing. Requires upfront payment or annual
      invoice.
    impact: low
    effort: low
    savingsPercent: 13
  - name: SCIM-Based License Hygiene
    description: >-
      Use Okta SCIM integration (Enterprise plan) to automatically deprovision
      seats when employees depart, preventing waste on unused licenses.
    impact: medium
    effort: medium
    applicablePlans:
      - Enterprise
allocation:
  - dimension: Department
    description: >-
      Allocate Clockwise costs by department using user counts per team.
      Engineering and product teams typically derive higher value from
      focus time protection.
  - dimension: CostCenter
    description: >-
      Map per-seat costs to cost centers by associating user licenses with
      cost center identifiers in HR/identity systems integrated via SCIM.
metering:
  - metric: ActiveSeats
    description: Number of licensed active users consuming the Clockwise service
    unit: users
    billingRelevant: true
  - metric: FocusTimeHours
    description: Total hours of protected focus time generated across the organization
    unit: hours
    billingRelevant: false
    valueMetric: true
  - metric: MeetingsOptimized
    description: Number of meetings reorganized or declined by Clockwise AI
    unit: meetings
    billingRelevant: false
    valueMetric: true
  - metric: SchedulingLinksCreated
    description: Number of smart scheduling links generated by users
    unit: links
    billingRelevant: false
    valueMetric: true
